version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        - npm run build --workspace=@getnear/config
        - npm run build --workspace=@getnear/validation
    build:
      commands:
        - npm run build --workspace=@getnear/web
        - ls -la apps/web/.next/
  artifacts:
    baseDirectory: apps/web/.next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
