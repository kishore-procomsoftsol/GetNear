version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        - npm run build --workspace=@getnear/config
        - npm run build --workspace=@getnear/validation
    build:
      commands:
        - cd apps/web && npx next build
        - ls -la apps/web/.next/ || echo "no .next folder"
        - ls -la apps/web/.amplify-hosting/ 2>/dev/null || echo "no .amplify-hosting folder"
        - cat apps/web/.next/required-server-files.json 2>/dev/null || echo "no required-server-files.json"
  artifacts:
    baseDirectory: apps/web/.next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
