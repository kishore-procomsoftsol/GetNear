name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'packages/**'
      - '.github/workflows/deploy-api.yml'

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: getnear-api
  SERVICE_ARN: arn:aws:ecs:ap-south-1:211125388599:service/default/getnear-api

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build --no-cache --platform linux/amd64 \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            -f api/Dockerfile .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Deploy to Express service
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          cat > /tmp/api-container.json << JSON
          {
            "image": "$IMAGE",
            "containerPort": 4000,
            "environment": [
              {"name": "PORT", "value": "4000"},
              {"name": "NODE_ENV", "value": "production"},
              {"name": "S3_BUCKET", "value": "getnear-assets"},
              {"name": "AWS_REGION", "value": "ap-south-1"}
            ],
            "secrets": [
              {"name": "AWS_ACCESS_KEY_ID", "valueFrom": "/getnear/prod/AWS_ACCESS_KEY_ID"},
              {"name": "AWS_SECRET_ACCESS_KEY", "valueFrom": "/getnear/prod/AWS_SECRET_ACCESS_KEY"},
              {"name": "GOOGLE_CLIENT_ID", "valueFrom": "/getnear/prod/GOOGLE_CLIENT_ID"},
              {"name": "GOOGLE_CLIENT_SECRET", "valueFrom": "/getnear/prod/GOOGLE_CLIENT_SECRET"},
              {"name": "GOOGLE_MAPS_API_KEY", "valueFrom": "/getnear/prod/GOOGLE_MAPS_API_KEY"},
              {"name": "RESEND_API_KEY", "valueFrom": "/getnear/prod/RESEND_API_KEY"},
              {"name": "SENTRY_DSN", "valueFrom": "/getnear/prod/SENTRY_DSN"},
              {"name": "SUPABASE_ANON_KEY", "valueFrom": "/getnear/prod/SUPABASE_ANON_KEY"},
              {"name": "SUPABASE_SERVICE_ROLE_KEY", "valueFrom": "/getnear/prod/SUPABASE_SERVICE_ROLE_KEY"},
              {"name": "SUPABASE_URL", "valueFrom": "/getnear/prod/SUPABASE_URL"},
              {"name": "TWILIO_ACCOUNT_SID", "valueFrom": "/getnear/prod/TWILIO_ACCOUNT_SID"},
              {"name": "TWILIO_AUTH_TOKEN", "valueFrom": "/getnear/prod/TWILIO_AUTH_TOKEN"},
              {"name": "TWILIO_VERIFY_SID", "valueFrom": "/getnear/prod/TWILIO_VERIFY_SID"},
              {"name": "FIREBASE_SERVICE_ACCOUNT_JSON", "valueFrom": "/getnear/prod/FIREBASE_SERVICE_ACCOUNT"}
            ]
          }
          JSON
          aws ecs update-express-gateway-service \
            --service-arn "$SERVICE_ARN" \
            --primary-container file:///tmp/api-container.json \
            --region $AWS_REGION
