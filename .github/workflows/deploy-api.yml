name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'packages/**'
      - '.github/workflows/deploy-api.yml'

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: getnear-api
  ECS_SERVICE: getnear-api
  ECS_CLUSTER: default
  ECS_TASK_DEFINITION: default-getnear-api

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create firebase service account file
        run: echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" | base64 -d > api/firebase-service-account.json

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build --platform linux/amd64 \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            -f api/Dockerfile .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Update task definition and deploy
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          aws ecs register-task-definition --cli-input-json "$(aws ecs describe-task-definition \
            --task-definition $ECS_TASK_DEFINITION --region $AWS_REGION \
            --query 'taskDefinition' --output json | python3 -c "
import json,sys
td=json.load(sys.stdin)
[td.pop(k,None) for k in ['taskDefinitionArn','revision','status','requiresAttributes','compatibilities','registeredAt','registeredBy']]
td['containerDefinitions'][0]['image']='$ECR_REGISTRY/$ECR_REPOSITORY:latest'
print(json.dumps(td))")" --region $AWS_REGION
          aws ecs update-service --cluster $ECS_CLUSTER --service $ECS_SERVICE \
            --task-definition $ECS_TASK_DEFINITION --force-new-deployment --region $AWS_REGION
