name: Deploy Admin

on:
  push:
    branches: [main]
    paths:
      - 'apps/admin/**'
      - 'packages/**'
      - '.github/workflows/deploy-admin.yml'

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: getnear-admin
  SERVICE_ARN: arn:aws:ecs:ap-south-1:211125388599:service/default/getnear-admin

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build --no-cache --platform linux/amd64 \
            --build-arg NEXT_PUBLIC_API_URL=https://api.getnear.ai/api/v1 \
            --build-arg NEXT_PUBLIC_APP_URL=https://getnear.ai \
            --build-arg NEXT_PUBLIC_ADMIN_URL=https://admin.getnear.ai \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            -f apps/admin/Dockerfile .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Deploy to Express service
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          aws ecs update-express-gateway-service \
            --service-arn "$SERVICE_ARN" \
            --primary-container "{\"image\":\"$IMAGE\",\"containerPort\":3001}" \
            --region $AWS_REGION
