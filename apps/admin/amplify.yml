version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - echo "Building admin with NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL"
        - NEXT_PUBLIC_API_URL=https://api.getnear.ai/api/v1 npm run build --workspace=@getnear/admin
  artifacts:
    baseDirectory: apps/admin/.next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
